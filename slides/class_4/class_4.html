### Distribución uniforme

.pull-left[

Los meteorólogos predicen que la temperatura mañana se encontrará entre 25 y 30 grados, donde todas las temperaturas en ese rango son igualmente probables


![](class_4_files/figure-html/unnamed-chunk-1-1.png)&lt;!-- --&gt;

]

--

.pull-right[

.bold[Función de densidad probabilistica (PDF):]

`\begin{align}
f(x) = 
  \begin{cases} 
   \frac{1}{b-a} &amp; \text{si } \quad b \leq x \leq a  \\
   0       &amp;  x &lt; a \quad \text{  o } \quad x &gt; b 
  \end{cases}
\end{align}`

&lt;br&gt;
En este caso `\(b=30\)` y `\(a=25\)`.
]

### Distribución uniforme

.pull-left[

Los meteorólogos predicen que la temperatura mañana se encontrará entre 25 y 30 grados, donde todas las temperaturas en ese rango son igualmente probables


![](class_4_files/figure-html/unnamed-chunk-2-1.png)&lt;!-- --&gt;


```

]


.pull-right[

.bold[Función de densidad probabilistica (PDF):]

`\begin{align}
f(x) = 
  \begin{cases} 
   \frac{1}{b-a} &amp; \text{si } \quad b \leq x \leq a  \\
   0       &amp;  x &lt; a \quad \text{  o } \quad x &gt; b 
  \end{cases}
\end{align}`

&lt;br&gt;
En este caso `\(b=30\)` y `\(a=25\)`.

&lt;br&gt;
.bold[Importante:]

`\begin{align}
f(x) \neq \mathbb{P}(X=x) 
\end{align}`

&lt;br&gt;

por ejemplo,

`\(f(27.3)\)` = 27.3/(30-25) = 5.46 

y

`\(\mathbb{P}(X=27.3) = 0\)`
]

### Distribución uniforme

.pull-left[

¿Cual es la probabilidad de que la temperatura esté por debajo de los 28 grados?

&lt;br&gt;

![](class_4_files/figure-html/unnamed-chunk-3-1.png)&lt;!-- --&gt;

]

--

.pull-rigth[

.bold[Función de distribución acumulada (CDF):]


`\begin{align}
F(k) &amp;= \mathbb{P}(X \leq k) \\ \\
     &amp;= \int_{a}^{k} f(x) dx \\ \\
     &amp;= \int_{a}^{k} \frac{1}{b-a} dx \\ \\
     &amp;= \left. \frac{x}{b-a} \right|_a^k \\ \\
     &amp;= \frac{k-a}{b-a}
\end{align}`

&lt;br&gt;
En este caso `\(a=25\)` y `\(k=28\)`.
]
